name: Scrape WARN

on:
  schedule:
    # 12:00 UTC daily.
    # = 7:00 AM EST during Standard Time (Nov–Mar)
    # = 8:00 AM EDT during Daylight Time (Mar–Nov)
    - cron: '0 12 * * *'
  workflow_dispatch: {}

# Required so the workflow can commit data/warn.json back to the repo.
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (with system libs)
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: npx tsx scripts/scrape-warn.ts

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/warn.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh WARN snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
